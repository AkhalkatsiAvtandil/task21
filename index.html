<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>task21</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <script type="module" defer src="assets/js/app.js"></script>
  </head>
  <body>
    <section class="container">
      <form action="#" method="#" id="login-form" novalidate>
        <div class="input-group">
          <label for="personal_number">personal-number</label>
          <input
            type="number"
            id="personal_number"
            name="personl-number"
            maxlength="11"
            minlength="11"
            required
          />
          <span class="message"></span>
        </div>
        <div class="input-group">
          <label for="mobile_number">mobile-number</label>
          <input
            type="number"
            id="mobile_number"
            name="mobile-number"
            maxlength="9"
            minlength="9"
            required
          />
          <span class="message"></span>
        </div>
        <div class="input-group">
          <label for="job_description">job-descripion</label>
          <input
            type="text"
            id="job_description"
            name="job-description"
            maxlength="50"
            required
          />
          <span class="message"></span>
        </div>
        <button type="submit">submit</button>
      </form>
    </section>
  </body>
</html>
